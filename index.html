<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parowazh</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    text-align:center;
    background:#1e293b;
    padding:40px;
    border-radius:20px;
    width:320px;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:4px solid white;
}

h1{
    margin:15px 0 10px;
}

a{
    display:block;
    margin-top:15px;
    background:#1877F2;
    color:white;
    text-decoration:none;
    padding:12px;
    border-radius:10px;
    font-weight:bold;
}

a:hover{
    background:#145dbf;
}
</style>

</head>
<body>

<div class="card">

<img src="https://i.imgur.com/2DhmtJ4.png">

<h1>Parowazh</h1>

<p>Welcome to my Facebook Profile 💙</p>

<a href="https://facebook.com/">Facebook Profile</a>

</div>

</body>
</html>
